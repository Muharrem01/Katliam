<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tayfa Katliam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Liste Görünümü -->
        <header id="main-header">
            <h1>TAYFA KATLİAM</h1>
        </header>

        <main id="home-view">
            <div class="team-grid">
                <!-- Person 1 -->
                <div class="person-card" data-person="1">
                    <div class="image-placeholder">Kişi 1</div>
                    <h3>Kişi 1</h3>
                </div>
                <!-- Person 2 -->
                <div class="person-card" data-person="2">
                    <div class="image-placeholder">Kişi 2</div>
                    <h3>Kişi 2</h3>
                </div>
                <!-- Person 3 -->
                <div class="person-card" data-person="3">
                    <div class="image-placeholder">Kişi 3</div>
                    <h3>Kişi 3</h3>
                </div>
                <!-- Person 4 -->
                <div class="person-card" data-person="4">
                    <div class="image-placeholder">Kişi 4</div>
                    <h3>Kişi 4</h3>
                </div>
                <!-- Person 5 -->
                <div class="person-card" data-person="5">
                    <div class="image-placeholder">Kişi 5</div>
                    <h3>Kişi 5</h3>
                </div>
            </div>
        </main>

        <!-- Detay Görünümü -->
        <section id="detail-view" class="hidden">
            <button id="back-button">&larr; Geri Dön</button>
            <div class="detail-content">
                <div id="detail-image" class="image-placeholder large">Fotoğraf Bekleniyor</div>
                <div class="detail-info">
                    <h2 id="detail-name">Kişi İsmi</h2>
                    <p id="detail-bio">Biyografi bilgisi buraya gelecek...</p>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
