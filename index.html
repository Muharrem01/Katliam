<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tayfa Katliam</title>
    <!-- Fontlar -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>
    <div class="bg-overlay"></div>
    <div id="app">
        <!-- ANA SAYFA (LİSTE) -->
        <div id="home-view">
            <header id="main-header">
                <h1>TAYFA KATLİAM</h1>
            </header>

            <main>
                <div class="team-grid">
                    <!-- Kişi 1 -->
                    <div class="person-card" data-person="1">
                        <img src="kisi1.jpg" alt="Muharrem Kural" class="image-placeholder" style="object-fit: cover;">
                        <h3>Muharrem Kural</h3>
                    </div>
                    <!-- Kişi 2 -->
                    <div class="person-card" data-person="2">
                        <img src="kisi2.jpg" alt="Çınar Güngör" class="image-placeholder" style="object-fit: cover;">
                        <h3>Çınar Güngör</h3>
                    </div>
                    <!-- Kişi 3 -->
                    <div class="person-card" data-person="3">
                        <img src="kisi3.jpg" alt="Ali Osman Beytemir" class="image-placeholder" style="object-fit: cover;">
                        <h3>Ali Osman Beytemir</h3>
                    </div>
                    <!-- Kişi 4 -->
                    <div class="person-card" data-person="4">
                        <img src="kisi4.jpg" alt="Elif Sena Bingöl" class="image-placeholder" style="object-fit: cover;">
                        <h3>Elif Sena Bingöl</h3>
                    </div>
                    <!-- Kişi 5 -->
                    <div class="person-card" data-person="5">
                        <img src="kisi5.jpeg" alt="Şeval Erkol" class="image-placeholder" style="object-fit: cover;">
                        <h3>Şeval Erkol</h3>
                    </div>
                </div>
            </main>
        </div>

        <!-- DETAY SAYFASI (BAŞLANGIÇTA GİZLİ) -->
        <section id="detail-view" class="hidden">
            <button id="back-button">&larr; Geri Dön</button>
            <div class="detail-content">
                <div id="detail-image" class="image-placeholder large">Fotoğraf Bekleniyor</div>
                <div class="detail-info">
                    <h2 id="detail-name">Kişi İsmi</h2>
                    <p id="detail-bio">Biyografi bilgisi buraya gelecek...</p>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js?v=1.1"></script>
</body>
</html>
